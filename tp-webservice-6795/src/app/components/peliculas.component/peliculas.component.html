<main class="py-5" style="background-color: var(--bg-color, #f4f6f8);">
    <div class="container mb-5">
        <h2 class="display-5 fw-bold text-center mb-4 text-theme">Películas Recomendadas</h2>
        
        <div class="row g-4" id="galeria-peliculas">
            
            <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let peli of peliculas">
                <div class="card h-100 card-efecto-zoom shadow-sm">
                    
                    <div class="overflow-hidden" style="height: 400px;">
                        <img [src]="peli.image" class="card-img-top w-100 h-100" style="object-fit: cover;" alt="{{ peli.title }}" loading="lazy">
                    </div>
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">{{ peli.title }} ({{ peli.year }})</h5>
                        
                        <p class="card-text text-muted small" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                            {{ peli.description }}
                        </p>
                        
                        <div class="mt-auto">
                            <div class="mb-3">
                                <span class="badge bg-primary me-1" *ngFor="let genero of peli.genre">
                                    {{ genero }}
                                </span>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center border-top pt-2">
                                <span class="badge bg-warning text-dark"><i class="bi bi-trophy-fill"></i> Rank: {{ peli.rank }}</span>
                                <span class="badge bg-success"><i class="bi bi-star-fill"></i> Rating: {{ peli.rating }}</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            
        </div>
    </div>
</main>
