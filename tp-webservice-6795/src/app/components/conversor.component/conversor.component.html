<main class="py-5" style="background-color: #f4f6f9; min-height: 100vh;">
    <div class="container">

        <div class="text-center mb-5 fade-in-rapido">
            <h1 class="display-4 fw-bold text-dark">
                <i class="bi bi-currency-exchange text-success"></i> Conversor de Divisas
            </h1>
            <p class="text-muted fs-5">Calculá el tipo de cambio en tiempo real.</p>
        </div>

        <div class="row justify-content-center fade-in-medio">
            <div class="col-12 col-lg-8">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5 bg-white">

                        <form>
                            <div class="row g-4 align-items-center">

                                <div class="col-md-12">
                                    <label class="form-label fw-bold text-muted">Monto a convertir</label>
                                    <div class="input-group input-group-lg">
                                        <span class="input-group-text bg-light border-end-0"><i
                                                class="bi bi-cash-stack text-success"></i></span>
                                        <input type="number" class="form-control border-start-0 ps-0"
                                            placeholder="Ej: 1000" [(ngModel)]="monto" name="montoInput" min="1">
                                    </div>
                                </div>

                                <div class="col-md-5">
                                    <label class="form-label fw-bold text-muted">De (Origen)</label>

                                    <select class="form-select form-select-lg" [(ngModel)]="monedaOrigen"
                                        name="origenSelect" [disabled]="cargandoMonedas">
                                        <option *ngIf="cargandoMonedas" value="USD">Cargando monedas...</option>

                                        <option *ngFor="let moneda of listaMonedas" [value]="moneda.codigo">
                                            {{ moneda.codigo }} - {{ moneda.nombre }}
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-2 text-center mt-5 d-none d-md-block">
                                    <div class="btn btn-outline-success rounded-circle p-3"
                                        style="pointer-events: none;">
                                        <i class="bi bi-arrow-left-right fs-4"></i>
                                    </div>
                                </div>

                                <div class="col-md-5">
                                    <label class="form-label fw-bold text-muted">A (Destino)</label>

                                    <select class="form-select form-select-lg" [(ngModel)]="monedaDestino"
                                        name="destinoSelect" [disabled]="cargandoMonedas">
                                        <option *ngIf="cargandoMonedas" value="ARS">Cargando monedas...</option>

                                        <option *ngFor="let moneda of listaMonedas" [value]="moneda.codigo">
                                            {{ moneda.codigo }} - {{ moneda.nombre }}
                                        </option>
                                    </select>
                                </div>

                                <div class="col-12 mt-5 text-center">
                                    <button type="button"
                                        class="btn btn-success btn-lg px-5 py-3 fw-bold rounded-pill shadow-sm"
                                        (click)="convertir()" [disabled]="cargando">
                                        <span *ngIf="!cargando">Convertir Divisas <i
                                                class="bi bi-calculator ms-2"></i></span>
                                        <span *ngIf="cargando">
                                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                            Calculando...
                                        </span>
                                    </button>
                                </div>

                            </div>
                        </form>

                    </div>

                    <div class="card-footer bg-success text-white text-center py-4 border-0">
                        <p class="mb-1 opacity-75 fw-bold text-uppercase">Resultado de la conversión</p>
                        <h2 class="display-5 fw-bold mb-0">
                            <span *ngIf="resultadoFinal !== null">{{ resultadoFinal | currency:monedaDestino }}</span>
                            <span *ngIf="resultadoFinal === null">- - -</span>
                        </h2>
                    </div>

                </div>
            </div>
        </div>

    </div>
</main>
